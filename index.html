<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador Anti-Bloqueio</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 30px; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 450px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        button { width: 100%; padding: 12px; background: #5865F2; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .item { background: #2c2c2c; padding: 10px; margin-bottom: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gerador "Discord-Friendly"</h2>
    <input type="text" id="baseEmail" placeholder="Seu e-mail base (ex: nome@gmail.com)" style="width:93%; padding:10px; margin-bottom:10px;">
    <button onclick="gerarAlias()">Gerar Variantes</button>
    <div id="lista"></div>
</div>

<script>
    function gerarAlias() {
        const base = document.getElementById('baseEmail').value;
        if (!base.includes('@')) return alert("Coloque um e-mail válido!");

        const [user, domain] = base.split('@');
        let novasContas = [];

        // Gera 5 variações usando pontos aleatórios (ex: n.ome, no.me, n.o.me)
        for(let i=0; i<5; i++) {
            let novoUser = user.split('').map(char => Math.random() > 0.5 ? char + '.' : char).join('');
            novasContas.push(novoUser.replace(/\.$/, '') + '@' + domain);
        }

        localStorage.setItem('contas', JSON.stringify(novasContas));
        exibir();
    }

    function exibir() {
        const lista = document.getElementById('lista');
        lista.innerHTML = "<h3>Variantes geradas:</h3>";
        const contas = JSON.parse(localStorage.getItem('contas') || '[]');
        contas.forEach((c) => {
            lista.innerHTML += `<div class="item">${c}</div>`;
        });
    }
</script>
</body>
</html>
