<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Aliases (Discord Accept)</title>
    <style>
        body { background: #23272a; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .box { background: #2f3136; padding: 25px; border-radius: 8px; width: 400px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        input { width: 92%; padding: 10px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #202225; background: #40444b; color: white; }
        button { width: 100%; padding: 10px; background: #5865f2; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; }
        .email-item { display: flex; justify-content: space-between; align-items: center; background: #40444b; padding: 10px; margin-top: 8px; border-radius: 4px; font-family: monospace; }
        .copy-btn { background: #43b581; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Gerador de Aliases</h2>
    <input type="email" id="emailBase" placeholder="Digite seu e-mail (ex: seuemail@gmail.com)">
    <button onclick="gerar()">Gerar 10 Variantes (+)</button>
    <div id="lista"></div>
</div>

<script>
    function gerar() {
        const email = document.getElementById('emailBase').value;
        if (!email.includes('@')) return alert("Por favor, insira um e-mail válido!");

        const [user, domain] = email.split('@');
        let listaContainer = document.getElementById('lista');
        listaContainer.innerHTML = "";

        for (let i = 0; i < 10; i++) {
            // Cria variantes aleatórias com pontos no nome de usuário
            let novoUser = user.split('').map(char => Math.random() > 0.4 ? char + '.' : char).join('').replace(/\.$/, '');
            let novoEmail = novoUser + '@' + domain;

            let div = document.createElement('div');
            div.className = 'email-item';
            div.innerHTML = `
                <span>${novoEmail}</span>
                <span class="copy-btn" onclick="copiar('${novoEmail}')">COPIAR</span>
            `;
            listaContainer.appendChild(div);
        }
    }

    function copiar(texto) {
        navigator.clipboard.writeText(texto);
        alert("E-mail copiado: " + texto);
    }
</script>

</body>
</html>
