<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de E-mails Ativos</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 400px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #03dac6; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .item { background: #2c2c2c; padding: 12px; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .trash { color: #cf6679; cursor: pointer; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Criador de E-mails</h2>
    <p style="font-size: 12px; color: #888;">E-mails gerados via API Mail7</p>
    <button onclick="criarEmailReal()">Gerar E-mail Real</button>
    <div id="lista"></div>
</div>

<script>
    async function criarEmailReal() {
        // Nome aleatório para o e-mail
        const user = "user" + Math.floor(Math.random() * 99999);
        const email = user + "@mail7.io";
        
        // No Mail7, a 'senha' é definida pelo usuário no primeiro acesso à caixa de entrada
        const senha = "Senha123!Secure"; 

        // Salva no LocalStorage
        let contas = JSON.parse(localStorage.getItem('minhasContas') || '[]');
        contas.push({ email, senha });
        localStorage.setItem('minhasContas', JSON.stringify(contas));
        
        exibir();
    }

    function deletar(index) {
        let contas = JSON.parse(localStorage.getItem('minhasContas'));
        contas.splice(index, 1);
        localStorage.setItem('minhasContas', JSON.stringify(contas));
        exibir();
    }

    function exibir() {
        const contas = JSON.parse(localStorage.getItem('minhasContas') || '[]');
        const lista = document.getElementById('lista');
        lista.innerHTML = "";
        
        contas.forEach((c, i) => {
            lista.innerHTML += `
                <div class="item">
                    <div>
                        <b>${c.email}</b><br>
                        <small>Acesso: ${c.senha}</small>
                    </div>
                    <span class="trash" onclick="deletar(${i})">×</span>
                </div>`;
        });
    }

    exibir();
</script>

</body>
</html>
